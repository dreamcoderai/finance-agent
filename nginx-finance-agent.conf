# Nginx virtual-host for Finance AI (Streamlit) — finance-agent.techalok.com
#
# Streamlit uses a WebSocket for its live session, so the location must carry
# the Upgrade/Connection headers.
#
# Streamlit also serves a static <title>Streamlit</title> with no Open Graph
# tags (page_title is applied client-side via JS, which link-preview crawlers
# never run), so we rewrite the title and inject OG/description meta with
# sub_filter for meaningful WhatsApp / Twitter / etc. previews.
#
# Install on the server:
#   scp nginx-finance-agent.conf root@142.93.222.199:/etc/nginx/sites-available/finance-agent.techalok.com
#   ssh root@142.93.222.199
#   ln -s /etc/nginx/sites-available/finance-agent.techalok.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d finance-agent.techalok.com

server {
    server_name finance-agent.techalok.com;
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Streamlit live session)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Ask upstream for uncompressed HTML so sub_filter can rewrite it
        proxy_set_header Accept-Encoding "";

        # Give crawlers a meaningful title + Open Graph / description meta
        sub_filter_once on;
        sub_filter '<title>Streamlit</title>' '<title>Finance AI Assistant</title><meta name="description" content="Ask questions about publicly traded companies — real-time stock prices, financial statements, and company insights, powered by AI."><meta property="og:title" content="Finance AI Assistant"><meta property="og:description" content="Ask questions about publicly traded companies — real-time stock prices, financials, and company insights, powered by AI."><meta property="og:type" content="website"><meta property="og:url" content="https://finance-agent.techalok.com/"><meta property="og:site_name" content="Finance AI Assistant"><meta name="twitter:card" content="summary"><meta name="twitter:title" content="Finance AI Assistant"><meta name="twitter:description" content="Ask questions about publicly traded companies, powered by AI.">';
    }

    listen 80;
    listen [::]:80;
}
