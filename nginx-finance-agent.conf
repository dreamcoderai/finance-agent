# Nginx virtual-host for Finance AI (Streamlit) — finance-agent.techalok.com
#
# Streamlit uses a WebSocket for its live session, so the /_stcore/stream
# location must carry the Upgrade/Connection headers.
#
# Install on the server:
#   scp nginx-finance-agent.conf root@142.93.222.199:/etc/nginx/sites-available/finance-agent.techalok.com
#   ssh root@142.93.222.199
#   ln -s /etc/nginx/sites-available/finance-agent.techalok.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d finance-agent.techalok.com

server {
    server_name finance-agent.techalok.com;
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Streamlit live session)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    listen 80;
    listen [::]:80;
}
